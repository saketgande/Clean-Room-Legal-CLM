services:
  api:
    build:
      context: .
    entrypoint: ["sh", "/app/scripts/entrypoint.sh"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - path: .env.example
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - contract_file_storage:/data/contracts
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/debug/health')"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  worker:
    build:
      context: .
    command: celery -A app.jobs.celery_app.celery_app worker --loglevel=info
    env_file:
      - path: .env.example
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - .:/app
      - contract_file_storage:/data/contracts

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: legal_clm
      POSTGRES_USER: legal_clm
      POSTGRES_PASSWORD: legal_clm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_clm -d legal_clm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  contract_file_storage:
