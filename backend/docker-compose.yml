services:
  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - path: .env.example
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - contract_file_storage:/data/contracts

  worker:
    build:
      context: .
    command: celery -A app.jobs.celery_app.celery_app worker --loglevel=info
    env_file:
      - path: .env.example
      - path: .env
        required: false
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - contract_file_storage:/data/contracts

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: legal_clm
      POSTGRES_USER: legal_clm
      POSTGRES_PASSWORD: legal_clm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  contract_file_storage:
